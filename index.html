<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Sonar Imaging Centre – Marketing Report</title>
  <style>
    html,
    body {
      margin: 0;
      width: 100%;
      height: 100%;
      background: #f7f8fb;
    }

    .loading {
      padding: 24px;
      font-family: Segoe UI, Arial, sans-serif;
      color: #1f2937;
    }
  </style>
</head>
<body>
  <div class="loading">Loading report…</div>
  <script>
    (async () => {
      try {
        const response = await fetch('./github%20file/index-march-9-14.html', { cache: 'no-cache' });
        if (!response.ok) throw new Error('Dashboard HTML could not be loaded');
        let html = await response.text();
        html = html.replace('<head>', '<head><base href="./github%20file/">');
        document.open();
        document.write(html);
        document.close();
      } catch (error) {
        document.body.innerHTML = '<p class="loading">Unable to load the report. <a href="./github%20file/index-march-9-14.html">Open the dashboard directly</a>.</p>';
      }
    })();
  </script>
</body>
</html>
